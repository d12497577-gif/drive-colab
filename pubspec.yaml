name: abdoutv
description: AbdouTV streaming app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.5
  flutter_svg: ^2.0.7

  # State management
  flutter_riverpod: ^2.4.0

  # Networking
  dio: 5.9.2
  retrofit: ^4.0.1
  json_annotation: ^4.9.0

  # DI
  get_it: ^7.6.0
  injectable: ^2.1.0

  # Media
  chewie: ^1.5.0
  video_player: ^2.6.0

  # Ads
  google_mobile_ads: ^2.3.0
  applovin_max: ^4.6.3

  # Images
  cached_network_image: ^3.2.3
  shimmer: ^3.0.0

  # Utilities
  package_info_plus: ^4.2.0
  url_launcher: ^6.1.10
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  build_runner: ^2.4.0
  retrofit_generator: ^8.0.0
  json_serializable: ^6.7.0
  injectable_generator: ^2.1.0
  flutter_launcher_icons: ^0.10.0

flutter_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#0F172A"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icon/
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
